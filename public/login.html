<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Rusun</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 flex items-center justify-center min-h-screen text-white relative overflow-hidden px-4">

<!-- BACKGROUND -->
<div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950"></div>

<div class="absolute w-[600px] h-[600px] bg-blue-600/20 blur-3xl rounded-full top-[-200px] left-[-200px]"></div>
<div class="absolute w-[600px] h-[600px] bg-purple-600/20 blur-3xl rounded-full bottom-[-200px] right-[-200px]"></div>

<!-- LOGIN CARD -->
<div class="relative z-10 backdrop-blur-xl bg-slate-900/70 border border-slate-800 p-6 sm:p-8 rounded-2xl w-full max-w-[380px] shadow-2xl">

<h2 class="text-xl sm:text-2xl font-bold mb-6 text-center tracking-wide">
🔐 LOGIN SIRAB KAWE
</h2>

<input 
id="username" 
placeholder="Username" 
class="w-full p-3 mb-4 bg-slate-800/80 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base">

<input 
id="password" 
type="password" 
placeholder="Password" 
class="w-full p-3 mb-4 bg-slate-800/80 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base">

<button 
id="loginBtn"
onclick="doLogin()" 
class="w-full bg-blue-600 hover:bg-blue-700 transition py-3 rounded-lg font-semibold tracking-wide shadow-lg flex items-center justify-center gap-2 text-sm sm:text-base">

<span id="btnText">MASUK</span>

<svg id="btnLoading" class="hidden animate-spin h-5 w-5 text-white"
xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
<path class="opacity-75" fill="currentColor"
d="M4 12a8 8 0 018-8v8H4z"></path>
</svg>

</button>

<p id="msg" class="text-red-400 text-sm mt-3 text-center hidden">
Username atau password salah
</p>

</div>

<script>

function setLoading(state){
const btn=document.getElementById("loginBtn");
const txt=document.getElementById("btnText");
const spin=document.getElementById("btnLoading");

if(state){
btn.disabled=true;
spin.classList.remove("hidden");
txt.innerText="Memproses...";
}else{
btn.disabled=false;
spin.classList.add("hidden");
txt.innerText="MASUK";
}
}

async function doLogin(){

const user = username.value.trim();
const pass = password.value.trim();
msg.classList.add("hidden");

if(!user || !pass){
msg.textContent = "Username dan password wajib diisi";
msg.classList.remove("hidden");
return;
}

setLoading(true);

try{

const res = await fetch("/api/login",{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-Requested-With":"XMLHttpRequest"
},
body: JSON.stringify({
username: user,
password: pass
})
});

const json = await res.json();

if(json.status){

sessionStorage.setItem("RUSUN_LOGIN","OK");
sessionStorage.setItem("RUSUN_USER",user);

location.href="/internal.html";

}else{

msg.textContent = "Username atau password salah";
msg.classList.remove("hidden");
setLoading(false);

}

}catch(e){

msg.textContent = "Server error";
msg.classList.remove("hidden");
setLoading(false);

}

}

document.addEventListener("keydown",function(e){
if(e.key==="Enter"){
doLogin();
}
});

</script>

</body>
</html>
